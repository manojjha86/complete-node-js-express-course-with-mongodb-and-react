<section class="panel panel-active">
                    <div class="grid cols-2">
                        <div class="field">
                            <label class="label required">Name</label>
                            <input class="input" placeholder="e.g., The Blue Lagoon Resort"
                                required />
                            <div class="error" id="err-name"></div>
                        </div>
                        <div class="field">
                            <label class="label required">Type</label>
                            <select class="select" required>
                                <option value="">Select a type</option>
                                <option>Hotel</option>
                                <option>Resort</option>
                                <option>Cabin</option>
                                <option>Apartment</option>
                            </select>
                            <div class="error" id="err-type"></div>
                        </div>
                    </div>

                    <div class="field">
                        <label class="label">Description</label>
                        <textarea class="textarea"
                            placeholder="Short description..."></textarea>
                    </div>

                    <div class="grid cols-2">
                        <div class="field">
                            <label class="label">Category</label>
                            <input class="  input"
                                   placeholder="Type to search…"
                            />

                            <input type="hidden" name="category" id="categoryHidden" />
                            <div class="hint">Select multiple categories. Use Backspace on empty input to remove
                                last chip.</div>
                        </div>

                        <div>
                            <label class="label">Selected Categories</label>
                            <div class="msel-chips" id="categoryChips"></div>
                        </div>
                    </div>
                </section>
