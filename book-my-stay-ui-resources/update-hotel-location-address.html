<section class="panel panel-active">
                    <div class="grid cols-3">
                        <div class="field">
                            <label class="label required">City</label>
                            <input class="input" placeholder="e.g., Goa" required />
                            <div class="error"></div>
                        </div>
                        <div class="field">
                            <label class="label required">Country</label>
                            <input class="input" placeholder="e.g., India" required />
                            <div class="error"></div>
                        </div>
                        <div class="field">
                            <label class="label">Distance from Airport (km)</label>
                            <input class="input" type="string" placeholder="e.g., 12.5km from city centre" />
                        </div>
                    </div>

                    <div class="grid cols-2">
                        <div class="field">
                            <label class="label required">Address Line 1</label>
                            <input class="input" placeholder="Street, building"
                                required />
                            <div class="error"></div>
                        </div>
                        <div class="field">
                            <label class="label" for="address2">Address Line 2</label>
                            <input class="input" placeholder="Area, block, etc." />
                        </div>
                    </div>

                    <div class="grid cols-3">
                        <div class="field">
                            <label class="label" for="zip">ZIP / Postal Code</label>
                            <input class="input" placeholder="e.g., 560001" />
                        </div>
                        <div class="field">
                            <label class="label" for="landmark">Landmark</label>
                            <input class="input" placeholder="Near..." />
                        </div>
                        <div class="grid cols-2">
                            <div class="field">
                                <label class="label" for="latitude">Latitude</label>
                                <input class="input" id="latitude" name="latitude" placeholder="28.6513" />
                            </div>
                            <div class="field">
                                <label class="label" for="longitude">Longitude</label>
                                <input class="input" id="longitude" name="longitude" placeholder="77.1906" />
                            </div>
                        </div>
                    </div>
                </section>
