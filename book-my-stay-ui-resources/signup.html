<main class="auth-shell">
    <section class="auth-card" aria-labelledby="signup-title">
      <h2 id="signup-title" class="auth-title">Create an Account</h2>

      <form class="auth-form" novalidate>
        <div class="grid-2">
          <div class="field">
            <label for="firstName">First name</label>
            <input id="firstName" name="firstName" type="text" class="control" placeholder="Manoj" required />
          </div>
          <div class="field">
            <label for="lastName">Last name</label>
            <input id="lastName" name="lastName" type="text" class="control" placeholder="Jha" required />
          </div>
        </div>

        <div class="field">
          <label for="signupEmail">Email</label>
          <input id="signupEmail" name="email" type="email" class="control" placeholder="you@example.com" required />
        </div>

        <div class="field">
          <label for="signupPassword">Password</label>
          <input id="signupPassword" name="password" type="password" class="control" placeholder="Create a password" minlength="8" required />
          <small class="help">Use 8+ characters with a mix of letters & numbers.</small>
        </div>

        <div class="field">
          <label for="confirmPassword">Confirm password</label>
          <input id="confirmPassword" name="confirmPassword" type="password" class="control" placeholder="Re‑enter your password" minlength="8" required />
        </div>

        <div class="field checkbox">
          <label class="check">
            <input type="checkbox" required />
            <span>I agree to the <a href="#">Terms</a> and <a href="#">Privacy Policy</a></span>
          </label>
        </div>

        <button class="btn-primary auth-submit" type="submit">Create account</button>
        <p class="alt-action">Already have an account? <a href="login.html">Sign in</a></p>

        <div class="divider"><span>or</span></div>

        <div class="social">
          <button type="button" class="btn-ghost social-btn">Sign up with Google</button>
          <button type="button" class="btn-ghost social-btn">Sign up with Microsoft</button>
        </div>
      </form>
    </section>
  </main>
