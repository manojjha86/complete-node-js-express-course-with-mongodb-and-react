<div class="modal-backdrop">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <div class="modal-title">Edit Hotel Details</div>
                    <div id="hotelModalDesc" class="hint">Edit the details, tab by tab, and click Save to save the changes.</div>
                </div>
                <button class="btn btn-close">✕</button>
            </div>

            <div class="tabs">
                <button class="tab active">Basic Info</button>
                <button class="tab">Location & Address</button>
                <button class="tab">Amenities</button>
                <button class="tab">Media & Featured</button>
            </div>

            <div class="panels">
                <section class="panel panel-active">
                    <h1>Basic Info</h1>
                </section>
                <section class="panel">
                    <h1>Location & Address</h1>
                </section>
                <section class="panel">
                    <h1>Amenities</h1>
                </section>
                <section class="panel">
                    <h1>Media & Featured</h1>
                </section>
            </div>

            <div class="modal-footer">
                <div class="hint">Tip: Use ⬅️ ➡️ to switch tabs · Esc to close</div>
                <div style="flex:1"></div>
                <button class="btn btn-cancel" id="cancelBtn" type="button">Cancel</button>
                <button class="btn btn-save" id="saveBtn" type="button">Save</button>
            </div>
        </div>
    </div>
